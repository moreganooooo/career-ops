# Portal Scanner Configuration — Morgan Escott
# Target: Email/Lifecycle Marketing · Sales Support/Enablement · Copywriting/Content Strategy · Onboarding/Implementation
# Updated: 2026-06-05
# Requirements: Remote only, US-based, IC roles.

# -- Location filter --
location_filter:
  allow:
    - "Virtual"
    - "Remote"
    - "Fully Remote"
    - "100% Remote"
    - "Remote - US"
    - "Remote, United States"
    - "United States"
    - "USA"
    - "Anywhere"
    - "US"
    - "United States of America"
    - "" # empty = unspecified location, let through
  block:
    - "On-site"
    - "On site"
    - "In-office"
    - "Hybrid"
    - "Commutable"
    - "Local candidates only"
    - "Relocation"
    - "Travel required"
    - "Frequent travel"
    - "India"
    - "Bengaluru"
    - "United Kingdom"
    - "London"
    - "Germany"
    - "France"
    - "Australia"
    - "Singapore"

# -- Title filter --
# PHILOSOPHY: Positive list uses broad root keywords matched as substrings.
# "Email" catches Email Marketing, Email Specialist, Email Programs Manager, etc.
# Negative list does the precision work — blocking what we definitely don't want.
# Updated 2026-06-05: +Social Media, Sales Support, Automation, Operations, Growth (positive);
#   removed Field Marketing, Event Marketing, SEO Specialist, Sales Development Representative (negative);
#   narrowed Engineer → " Engineer" (leading space) to avoid blocking GTM Engineer (Marketing);
#   SEO Manager retained in negative.
# Updated 2026-06-05 (audit): +Coordinator, Specialist, Brand, Program, Partner (positive);
#   +Test Automation, QA (negative); +workday-sweep to alert_on_zero_sources.
title_filter:
  positive:
    # Core disciplines
    - "Marketing"      # catches ~40+ variants on its own
    - "Email"          # Email Marketing, Email Specialist, Email Programs, Email Experience
    - "Lifecycle"      # exact discipline name; lifecycle marketing, lifecycle specialist
    - "CRM"            # CRM Marketing, CRM Specialist, CRM Coordinator, CRM Admin
    - "Campaign"       # Campaign Manager, Campaign Specialist, Campaign Ops, Campaign Coordinator
    - "GTM"            # GTM Enablement, GTM Coordinator, GTM Readiness, Go-to-Market
    - "Social Media"   # Social Media Manager, Social Media Strategist, Social Media Coordinator
    - "Sales Support"  # Sales Support Specialist, Sales Support Coordinator
    - "Automation"     # Marketing Automation, CRM Automation, Automation Specialist
    - "Operations"     # Marketing Operations, Revenue Operations, Campaign Operations
    - "Growth"         # Growth Marketing, Growth Manager, Growth Strategist

    # Role-level catch-alls
    - "Coordinator"    # Marketing Coordinator, Onboarding Coordinator, Campaign Coordinator
    - "Specialist"     # Email Specialist, Engagement Specialist, Implementation Specialist
    - "Program"        # Email Programs Manager, Customer Programs Lead, Program Manager
    - "Brand"          # Brand Strategist, Brand Copywriter, Brand Storyteller, Brand Manager
    - "Partner"        # Partner Marketing Manager, Partner Enablement, Partner Success

    # Content & copy
    - "Content"        # Content Strategist, Content Writer, Content Coordinator, Content Specialist
    - "Copywriter"     # Copywriter, Copywriting, Copy Strategist
    - "Writer"         # Marketing Writer, Staff Writer, Editorial Writer, Proposal Writer
    - "Editorial"      # Editorial Manager, Editorial Strategist (media + nonprofit orgs)
    - "Narrative"      # Brand Narrative Lead, Narrative Strategist
    - "Messaging"      # Messaging Strategist, Messaging & Positioning Specialist
    - "Storytell"      # Storyteller, Digital Storytelling (nonprofit-specific)
    - "Instructional"  # Instructional Designer

    # Communications & outreach
    - "Communications" # Communications Specialist, Donor Comms, Member Comms, Constituent Comms
    - "Outreach"       # Community Outreach Coordinator, Digital Outreach Specialist
    - "Donor"          # Donor Communications, Donor Relations (nonprofit)

    # Enablement & sales support
    - "Enablement"     # Sales, GTM, Field, Revenue, Partner, Customer Success Enablement
    - "Readiness"      # Sales Readiness, GTM Readiness Manager
    - "Training"       # Training Specialist, Sales Trainer, Customer Trainer

    # Lifecycle / retention / nurture
    - "Retention"      # Retention Marketing, Member Retention, Subscriber Retention
    - "Nurture"        # Nurture campaigns, Nurture Specialist
    - "Engagement"     # Audience, Customer, Member, Patient Engagement
    - "Journey"        # Member Journey, Customer Journey, User Journey Specialist

    # Onboarding / implementation / CX
    - "Onboarding"     # Customer, Client, User, Product Onboarding
    - "Implementation" # Implementation Specialist, Manager, Coordinator, Analyst
    - "Adoption"       # Adoption Specialist, Platform Adoption
    - "Launch"         # Launch Specialist, Customer Launch Manager (SaaS-common)
    - "Activation"     # User Activation Specialist (PLG companies)
    - "Success"        # Customer Success Manager, Specialist, Associate
    - "Experience"     # Customer Experience, Member Experience, Patient Experience
    - "Relationship"   # Relationship Manager, Client Relationship Specialist

  negative:
    - " Engineer"      # leading space: blocks Software Engineer, Data Engineer, etc. but NOT GTM Engineer (Marketing)
    - "Developer"
    - "Software"
    - "Full Stack"
    - "Frontend"
    - "Front End"
    - "Backend"
    - "Data Scientist"
    - "Data Engineer"
    - "Analytics Engineer"
    - "Business Intelligence"
    - "Product Manager"
    - "Product Designer"
    - "Vice President"
    - "VP "
    - "Chief "
    - "CMO"
    - "Director of"
    - "Java "
    - "Python Developer"
    - "iOS"
    - "Android"
    - "Blockchain"
    - "Crypto"
    - "Recruiter"
    - "HR Manager"
    - "Salesforce Admin"

    # Customer Service / Support false positives
    - "Customer Service Representative"
    - "CSR"
    - "Call Center"
    - "Help Desk"
    - "Tier 1 Support"
    - "Technical Support Representative"
    - "Inbound Calls"

    # Sales / outbound false positives
    - "Cold Calling"
    - "BDR"
    - "SDR"

    # Non-US geographic qualifiers in title
    - "EMEA"
    - "APAC"
    - "LATAM"
    - "MENA"
    - "- UK"
    - "- Canada"
    - "- Brazil"
    - "- Africa"
    - "- Turkey"
    - "- India"
    - "- Australia"
    - "- Germany"
    - "- France"
    - "- Singapore"

    # HR/employee lifecycle false positives
    - "Employee Relations"
    - "Time and Attendance"
    - "Time & Attendance"
    - "Payroll"
    - "People Operations"
    - "HR Business Partner"
    - "Contract Management"

    # Tech / data / analytics false positives
    - "Machine Learning"
    - "Data Analyst"
    - "BI Analyst"
    - "Growth Hacker"
    - "Tableau"
    - "Looker"
    - "dbt "
    - "SQL "

    # Performance marketing roles
    - "Paid Media"
    - "Paid Search"
    - "SEM"
    - "PPC"
    - "SEO Manager"

    # Senior leadership / over-senior roles
    # Note: 'Senior' and 'Principal' intentionally omitted — Senior/Principal IC roles are in scope.
    - "Head of "
    - "SVP"

    # HR / people ops false positives
    - "Benefits "
    - "L&D Business Partner"
    - "Compensation"

    # Deep technical CRM / RevOps / Salesforce roles
    - "Revenue Operations Manager"
    - "Sales Operations Manager"
    - "Developer"
    - "Database"
    - "Marketo"

    # Functional noise (facilities, finance, legal, IT)
    - "Facilities"
    - "IT Support"
    - "Legal "
    - "Finance "
    - "Accounting"
    - "Procurement"

    # QA / test automation false positives
    - "Test Automation"
    - "QA "

seniority_boost:
  - "Senior"
  - "II"
  - "III"

# =========================================================
# -- Reporting --
# =========================================================
reporting:
  track_source_counts: true
  track_source_category_counts: true
  min_results_to_report: 1
  output_source_column: true
  alert_on_zero_sources:
    - greenhouse-sweep
    - ashby-sweep
    - lever-sweep
    - workday-sweep

