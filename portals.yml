# Portal Scanner Configuration — Morgan Escott
# Target: Email/Lifecycle Marketing · Sales Enablement · B2B Content Strategy
# Updated: 2026-06-04
# Requirements: Remote only, US-based, IC roles.

# -- Location filter --
location_filter:
  allow:
    - "Virtual"
    - "Remote"
    - "Fully Remote"
    - "100% Remote"
    - "Remote - US"
    - "Remote, United States"
    - "United States"
    - "USA"
    - "Anywhere"
    - "US"
    - "United States of America"
    - "" # empty = unspecified location, let through
  block:
    - "On-site"
    - "On site"
    - "In-office"
    - "Hybrid"
    - "Commutable"
    - "Local candidates only"
    - "Must reside"
    - "Must be based in"
    - "Relocation"
    - "Travel required"
    - "Frequent travel"
    - "India"
    - "Bengaluru"
    - "United Kingdom"
    - "London"
    - "Germany"
    - "France"
    - "Australia"
    - "Singapore"

