# =========================================================
# -- Search queries --
#
# PHILOSOPHY: Queries cast a wide categorical net.
# Exact-title precision is handled downstream by title_filter.positive.
# Each query uses broad role-category terms + hard negatives for obvious
# noise (engineer, developer, recruiter). One query per board where possible.
#
# CATEGORIES COVERED:
#   marketing · lifecycle · campaign · email · CRM · content · communications
#   enablement · sales support · revenue ops (lite) · implementation
#   onboarding · customer success · customer education · adoption
# =========================================================
search_queries:

# =========================================================
# ATS Platform Sweeps (Greenhouse / Ashby / Lever / Workable)
# These boards host hundreds of companies — wide queries surface the most.
# title_filter does the pruning after results are fetched.
# =========================================================

- name: Greenhouse — marketing + lifecycle + enablement + implementation remote
  query: >-
    (site:boards.greenhouse.io OR site:job-boards.greenhouse.io)
    (marketing OR lifecycle OR campaign OR email OR CRM OR content OR
    communications OR enablement OR implementation OR onboarding OR
    "customer success" OR "customer education" OR adoption OR retention)
    remote -engineer -developer -recruiter -"paid media" -"paid search"
  enabled: true

- name: Ashby — marketing + lifecycle + enablement + implementation remote
  query: >-
    site:jobs.ashbyhq.com
    (marketing OR lifecycle OR campaign OR email OR CRM OR content OR
    communications OR enablement OR implementation OR onboarding OR
    "customer success" OR adoption OR retention)
    remote -engineer -developer -recruiter -"paid media" -"paid search"
  enabled: true

- name: Lever — marketing + lifecycle + enablement + implementation remote
  query: >-
