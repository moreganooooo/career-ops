name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: actions/setup-go@v6
        with:
          go-version-file: dashboard/go.mod
      - run: npm install
      - run: node test-all.mjs --quick
