<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  @font-face {
    font-family: 'DM Serif Display';
    src: url('./fonts/dm-serif-display-latin.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'DM Serif Display';
    src: url('./fonts/dm-serif-display-latin-ext.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  @font-face {
    font-family: 'Inter';
    src: url('./fonts/inter-latin.woff2') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'Inter';
    src: url('./fonts/inter-latin-ext.woff2') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'Inter', sans-serif;
    font-size: 10pt;
    font-weight: 400;
    line-height: 1.3;
    color: #000000;
    background: #ffffff;
    padding: 0;
    margin: 0;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 0;
  }

  /* === HEADER === */
  .header {
    margin-bottom: 4px;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32pt;
    font-weight: 400;
    color: #000000;
    letter-spacing: -0.0016in;
    line-height: 0.5in;
    margin-bottom: 0;
  }

  .header-tagline {
    font-family: 'Inter', sans-serif;
    font-size: 14pt;
    font-weight: 400;
    letter-spacing: -0.0016in;
    color: #000000;
    line-height: 0.2402in;
    margin-bottom: 4px;
  }

  .contact-row {
    font-family: 'Inter', sans-serif;
    font-size: 10pt;
    font-weight: 400;
    line-height: 1.3;
    color: #000000;
    letter-spacing: -0.0016in;
  }

  .contact-row .separator {
    color: #000000;
    padding: 0 3px;
  }

  /* === SECTIONS === */
  .section {
    margin-bottom: 3px;
  }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 16pt;
    font-weight: 400;
    color: #000000;
    border-bottom: 0.018cm solid #9aa3af;
    padding-bottom: 0.0138in;
    margin-top: 0.01in;
    margin-bottom: 3px;
    line-height: 1;
  }

  /* === PROFESSIONAL SUMMARY === */
  .summary-text {
    font-size: 10pt;
    font-weight: 400;
    line-height: 1.3;
    color: #000000;
  }

  .summary-text strong {
    font-weight: 600;
    color: #000000;
  }

  /* === SKILLS === */
  .skills-grid {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .skill-item {
    font-size: 9.5pt;
    font-weight: 400;
    color: #000000;
    line-height: 1.25;
  }

  .skill-category {
    font-weight: 600;
    color: #000000;
    font-size: 9.5pt;
    letter-spacing: -0.0016in;
  }

  /* === WORK EXPERIENCE === */
  .job {
    margin-bottom: 4px;
  }

  .job-title {
    font-family: 'Inter', sans-serif;
    font-size: 10pt;
    font-weight: 600;
    color: #000000;
    letter-spacing: -0.0016in;
    line-height: 1.4;
  }

  .job-meta {
    font-family: 'Inter', sans-serif;
    font-size: 10pt;
    font-weight: 600;
    color: #000000;
    letter-spacing: -0.0016in;
    border-bottom: 0.018cm solid #9aa3af;
    padding-bottom: 0.0138in;
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .job ul {
    padding-left: 16px;
    margin-top: 2px;
  }

  .job li {
    font-size: 9.5pt;
    font-weight: 400;
    line-height: 1.25;
    color: #000000;
    margin-bottom: 2px;
    margin-top: 0;
    list-style: disc;
  }

  .job li strong {
    font-weight: 600;
    color: #000000;
  }

  .job-note {
    font-size: 9.5pt;
    font-weight: 400;
    font-style: italic;
    color: #000000;
    margin-top: 0.0402in;
    margin-bottom: 0.0201in;
    line-height: 1.3;
  }

  .job-note strong {
    font-weight: 600;
    font-style: normal;
    color: #000000;
  }

  .client-list {
    font-size: 9.5pt;
    font-weight: 400;
    color: #000000;
    margin-bottom: 3px;
    line-height: 1.3;
  }

  .client-list strong {
    font-weight: 600;
    color: #000000;
  }

  /* === TRAINING & CERTIFICATIONS === */
  .cert-item {
    margin-bottom: 1px;
  }

  .cert-title {
    font-size: 10pt;
    font-weight: 600;
    color: #000000;
    letter-spacing: -0.0016in;
    line-height: 1.3;
  }

  .cert-desc {
    font-size: 9.5pt;
    font-weight: 400;
    color: #000000;
    margin-top: 2px;
    line-height: 1.3;
  }

  /* === EDUCATION === */
  .edu-item {
    margin-bottom: 5px;
  }

  .edu-title {
    font-weight: 600;
    font-size: 10pt;
    color: #000000;
    letter-spacing: -0.0016in;
    line-height: 1.3;
    border-bottom: 0.018cm solid #9aa3af;
    padding-bottom: 0.0138in;
    margin-bottom: 4px;
  }

  .edu-desc {
    font-size: 9.5pt;
    font-weight: 400;
    color: #000000;
    margin-top: 2px;
    line-height: 1.3;
  }

  .edu-item ul {
    padding-left: 16px;
    margin-top: 2px;
  }

  .edu-item li {
    font-size: 9.5pt;
    font-weight: 400;
    line-height: 1.3;
    color: #000000;
    margin-bottom: 2px;
    list-style: disc;
  }

  .edu-item li strong {
    font-weight: 600;
    color: #000000;
  }

  /* === WHY THIS COMPANY === */
  /* Each sentence is a .why-item div with a bold label on its own line */
  .why-text {
    font-size: 9.5pt;
    font-weight: 400;
    color: #000000;
    font-style: italic;
  }

  .why-item {
    line-height: 1.35;
    margin-bottom: 4px;
  }

  .why-item strong {
    display: block;
    font-weight: 600;
    font-style: normal;
    color: #000000;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page {
      padding: 0;
    }
  }

  /* === PAGE BREAK CONTROL === */
  /* .job intentionally excluded -- Treering block is long enough to span pages naturally */
  .avoid-break,
  .cert-item,
  .edu-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="header-tagline">{{TAGLINE}}</div>
    <div class="contact-row">
      <span>{{PHONE}}</span>
      <span class="separator">|</span>
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <span>{{LINKEDIN_DISPLAY}}</span>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- PROFESSIONAL SUMMARY -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SUMMARY}}</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <!-- SKILLS -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SKILLS}}</div>
    <div class="skills-grid">
      {{SKILLS}}
    </div>
  </div>

  <!-- WORK EXPERIENCE -->
  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    {{EXPERIENCE}}
  </div>

  <!-- TRAINING & CERTIFICATIONS -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_CERTIFICATIONS}}</div>
    {{CERTIFICATIONS}}
  </div>

  <!-- EDUCATION -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_EDUCATION}}</div>
    {{EDUCATION}}
  </div>

  <!-- WHY THIS COMPANY (omit if CV is already 2 pages) -->
  {{WHY_SECTION}}

</div>
</body>
</html>
